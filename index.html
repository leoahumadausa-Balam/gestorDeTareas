<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

    <!-- Container 1: Título y Menú de la App -->
    <header class="container mt-4 mb-4">
        <div class="row bg-white p-3 rounded shadow-sm align-items-center">
            <div class="col-md-6">
                <h1 class="m-0 text-primary">TaskMaster</h1>
            </div>
            <div class="col-md-6 text-md-end d-flex justify-content-end">
                <!-- Buscador en tiempo real -->
                <input type="search" class="form-control rounded-pill border-2 w-75" id="inputBuscador"
                    placeholder="🔍 Buscar tarea...">
            </div>
        </div>
    </header>

    <!-- Container 2: Columnas Centradas para las listas -->
    <main class="container mb-4">
        <div class="row g-4 justify-content-center">
            <!-- Columna Pendiente -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0 bg-white">
                    <div class="card-header bg-warning text-dark fw-bold text-center border-0 rounded-top">
                        Pendiente
                    </div>
                    <div class="card-body bg-light rounded-bottom p-2" id="columna-pendiente"
                        style="min-height: 300px;">
                        <!-- Aquí se inyectarán las tareas pendientes -->
                    </div>
                </div>
            </div>

            <!-- Columna En Progreso -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0 bg-white">
                    <div class="card-header bg-info text-dark fw-bold text-center border-0 rounded-top">
                        En Progreso
                    </div>
                    <div class="card-body bg-light rounded-bottom p-2" id="columna-progreso" style="min-height: 300px;">
                        <!-- Aquí se inyectarán las tareas en progreso -->
                    </div>
                </div>
            </div>

            <!-- Columna Realizada -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0 bg-white">
                    <div class="card-header bg-success text-white fw-bold text-center border-0 rounded-top">
                        Realizada
                    </div>
                    <div class="card-body bg-light rounded-bottom p-2" id="columna-realizada"
                        style="min-height: 300px;">
                        <!-- Aquí se inyectarán las tareas realizadas -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Container 3: Botones de activación -->
    <div class="container text-center mb-5">
        <button type="button" class="btn btn-primary btn-lg rounded-pill shadow px-5" data-bs-toggle="modal"
            data-bs-target="#modalNuevaTarea">
            + Nueva Tarea
        </button>
    </div>

    <!-- Modal del Formulario -->
    <div class="modal fade" id="modalNuevaTarea" tabindex="-1" aria-labelledby="modalNuevaTareaLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalNuevaTareaLabel">Crear Nueva Tarea</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Formulario de Captura -->
                    <form id="formulario-tarea">
                        <div class="mb-3">
                            <label for="inputTitulo" class="form-label fw-bold">Título</label>
                            <input type="text" class="form-control" id="inputTitulo" placeholder="Ej. Comprar víveres"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="inputDescripcion" class="form-label fw-bold">Descripción</label>
                            <textarea class="form-control" id="inputDescripcion" rows="3"
                                placeholder="Detalles de la tarea..." required></textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label for="selectPrioridad" class="form-label fw-bold">Prioridad</label>
                                <select class="form-select" id="selectPrioridad" required>
                                    <option value="" selected disabled>Seleccionar</option>
                                    <option value="Baja">Baja</option>
                                    <option value="Media">Media</option>
                                    <option value="Alta">Alta</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label for="inputFechaLimite" class="form-label fw-bold">Fecha Límite</label>
                                <input type="datetime-local" class="form-control" id="inputFechaLimite" required>
                            </div>
                        </div>
                        <!-- Footer integrado dentro del formulario -->
                        <div class="modal-footer px-0 pb-0 border-0 mt-4">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar Tarea</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle (Includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script principal -->
    <script src="api.js"></script>
    <script src="clases.js"></script>
    <script src="app.js"></script>
</body>

</html>
